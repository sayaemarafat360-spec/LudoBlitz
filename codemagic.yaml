# Codemagic CI/CD Configuration for Ludo Blitz
# https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  # Debug Workflow
  debug-workflow:
    name: Debug Build
    max_build_duration: 30
    environment:
      java: 17
      groups:
        - android_credentials
      vars:
        BUILD_TYPE: debug
        GRADLE_TASK: assembleDebug
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: develop
          include: true
        - pattern: feature/*
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Grant execute permission for gradlew
        script: |
          chmod +x ./gradlew
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true

  # Release Workflow
  release-workflow:
    name: Release Build
    max_build_duration: 45
    environment:
      java: 17
      groups:
        - android_credentials
        - keystore_credentials
      vars:
        BUILD_TYPE: release
        GRADLE_TASK: assembleRelease
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: master
          include: true
        - pattern: release/*
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Grant execute permission for gradlew
        script: |
          chmod +x ./gradlew
      - name: Build Release APK
        script: |
          ./gradlew assembleRelease --stacktrace
    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/mapping.txt
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
      # Google Play Store publishing (uncomment and configure when ready)
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true

  # Test Workflow
  test-workflow:
    name: Run Tests
    max_build_duration: 20
    environment:
      java: 17
    triggering:
      events:
        - pull_request
      cancel_previous_builds: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Grant execute permission for gradlew
        script: |
          chmod +x ./gradlew
      - name: Run Unit Tests
        script: |
          ./gradlew testDebugUnitTest --stacktrace
      - name: Run Lint
        script: |
          ./gradlew lintDebug --stacktrace
    artifacts:
      - app/build/reports/
      - app/build/test-results/