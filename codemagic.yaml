# Codemagic CI/CD Configuration for Ludo Blitz
# Separate workflows for Debug and Release builds

workflows:
  ludo-blitz-debug:
    name: Ludo Blitz Debug Build
    max_build_duration: 30
    environment:
      java: 17
      groups:
        - firebase_credentials
    scripts:
      # Fix Gradle wrapper permission
      - name: Make Gradle Executable
        script: |
          chmod +x gradlew

      # Print environment info
      - name: Print Environment Info
        script: |
          echo "=========================================="
          echo "🎮 LUDO BLITZ - DEBUG BUILD STARTED"
          echo "=========================================="
          echo "Java Version:"
          java -version
          echo "------------------------------------------"
          echo "Gradle Version:"
          ./gradlew --version

      # Generate Debug Keystore and SHA-1 Key
      - name: Generate Debug Keystore & SHA-1 Key
        script: |
          echo "=========================================="
          echo "🔑 GENERATING DEBUG SHA-1 KEY FOR FIREBASE"
          echo "=========================================="

          mkdir -p ~/.android

          if [ ! -f ~/.android/debug.keystore ]; then
            echo "Creating new debug keystore..."
            keytool -genkeypair \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -keypass android
          fi

          echo ""
          echo "=========================================="
          echo "🔐 DEBUG SHA-1 FINGERPRINT FOR FIREBASE:"
          echo "=========================================="
          echo ""
          echo "COPY THE SHA-1 VALUE BELOW AND ADD IT TO:"
          echo "Firebase Console > Project Settings > Your Apps > Add Fingerprint"
          echo ""
          echo "------------------------------------------"

          SHA1=$(keytool -list -v -alias androiddebugkey -keystore ~/.android/debug.keystore -storepass android -keypass android 2>/dev/null | grep "SHA1:" | head -1 | awk '{print $2}')
          SHA256=$(keytool -list -v -alias androiddebugkey -keystore ~/.android/debug.keystore -storepass android -keypass android 2>/dev/null | grep "SHA256:" | head -1 | awk '{print $2}')

          echo "🔑 SHA-1: $SHA1"
          echo "🔑 SHA-256: $SHA256"
          echo "------------------------------------------"
          echo ""

          echo "DEBUG SHA-1: $SHA1" > $CM_BUILD_DIR/debug_sha_keys.txt
          echo "DEBUG SHA-256: $SHA256" >> $CM_BUILD_DIR/debug_sha_keys.txt
          echo "Timestamp: $(date)" >> $CM_BUILD_DIR/debug_sha_keys.txt

      # Clean Project
      - name: Clean Project
        script: |
          echo "🧹 Cleaning project..."
          ./gradlew clean

      # Build Debug APK
      - name: Build Debug APK
        script: |
          echo "=========================================="
          echo "🔨 BUILDING DEBUG APK"
          echo "=========================================="
          ./gradlew assembleDebug --stacktrace

      # Run Lint (optional)
      - name: Run Lint Check
        script: |
          echo "🔍 Running lint check..."
          ./gradlew lint || true

      # Print Build Info
      - name: Print Debug Build Information
        script: |
          echo ""
          echo "=========================================="
          echo "✅ DEBUG BUILD COMPLETED SUCCESSFULLY!"
          echo "=========================================="
          echo ""
          echo "📁 APK Location:"
          find $CM_BUILD_DIR -name "*debug*.apk" -type f
          echo ""
          echo "📊 APK Size:"
          find $CM_BUILD_DIR -name "*debug*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "🔑 Debug SHA Keys:"
          cat $CM_BUILD_DIR/debug_sha_keys.txt || echo "Debug SHA key file not found"
          echo ""
          echo "=========================================="

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - debug_sha_keys.txt

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ludo-blitz-release:
    name: Ludo Blitz Release Build
    max_build_duration: 30
    environment:
      java: 17
      groups:
        - firebase_credentials
    scripts:
      # Fix Gradle wrapper permission
      - name: Make Gradle Executable
        script: |
          chmod +x gradlew

      # Print environment info
      - name: Print Environment Info
        script: |
          echo "=========================================="
          echo "🎮 LUDO BLITZ - RELEASE BUILD STARTED"
          echo "=========================================="
          echo "Java Version:"
          java -version
          echo "------------------------------------------"
          echo "Gradle Version:"
          ./gradlew --version

      # Prepare Release Keystore
      - name: Prepare Release Keystore
        script: |
          echo "=========================================="
          echo "🔐 PREPARING RELEASE KEYSTORE"
          echo "=========================================="

          if [ -n "$CM_KEYSTORE" ]; then
            echo "Using provided release keystore..."
            echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/release.keystore
          else
            echo "No release keystore provided. Creating temporary release keystore..."
            keytool -genkeypair \
              -alias ludoblitz \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Ludo Blitz,O=Ludo Blitz,C=US" \
              -keystore $CM_BUILD_DIR/release.keystore \
              -storepass ludoblitz123 \
              -keypass ludoblitz123
          fi

          RELEASE_SHA1=$(keytool -list -v -alias ludoblitz -keystore $CM_BUILD_DIR/release.keystore -storepass ludoblitz123 -keypass ludoblitz123 2>/dev/null | grep "SHA1:" | head -1 | awk '{print $2}')
          RELEASE_SHA256=$(keytool -list -v -alias ludoblitz -keystore $CM_BUILD_DIR/release.keystore -storepass ludoblitz123 -keypass ludoblitz123 2>/dev/null | grep "SHA256:" | head -1 | awk '{print $2}')

          echo "🔑 RELEASE SHA-1: $RELEASE_SHA1"
          echo "🔑 RELEASE SHA-256: $RELEASE_SHA256"

          echo "RELEASE SHA-1: $RELEASE_SHA1" > $CM_BUILD_DIR/release_sha_keys.txt
          echo "RELEASE SHA-256: $RELEASE_SHA256" >> $CM_BUILD_DIR/release_sha_keys.txt
          echo "Timestamp: $(date)" >> $CM_BUILD_DIR/release_sha_keys.txt

      # Clean Project
      - name: Clean Project
        script: |
          echo "🧹 Cleaning project..."
          ./gradlew clean

      # Build Release APK
      - name: Build Release APK
        script: |
          echo "=========================================="
          echo "📦 BUILDING RELEASE APK"
          echo "=========================================="

          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$CM_BUILD_DIR/release.keystore \
            -Pandroid.injected.signing.store.password=ludoblitz123 \
            -Pandroid.injected.signing.key.alias=ludoblitz \
            -Pandroid.injected.signing.key.password=ludoblitz123 \
            --stacktrace

      # Run Lint (optional)
      - name: Run Lint Check
        script: |
          echo "🔍 Running lint check..."
          ./gradlew lint || true

      # Print Build Info
      - name: Print Release Build Information
        script: |
          echo ""
          echo "=========================================="
          echo "✅ RELEASE BUILD COMPLETED SUCCESSFULLY!"
          echo "=========================================="
          echo ""
          echo "📁 APK Location:"
          find $CM_BUILD_DIR -name "*release*.apk" -type f
          echo ""
          echo "📊 APK Size:"
          find $CM_BUILD_DIR -name "*release*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "🔑 Release SHA Keys:"
          cat $CM_BUILD_DIR/release_sha_keys.txt || echo "Release SHA key file not found"
          echo ""
          echo "=========================================="

    artifacts:
      - app/build/outputs/apk/release/*.apk
      - app/build/outputs/mapping/release/mapping.txt
      - release_sha_keys.txt

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true